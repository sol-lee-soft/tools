<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sol-Lee-Soft | Project Asset Manager</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-color: #e0e0e0;
            --accent-color: #bb86fc;
            --sub-text: #999;
            --border-color: #333;
            --success-color: #03dac6;
            --warning-color: #cf6679;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container { width: 100%; max-width: 750px; }
        
        header { margin-top: 20px; margin-bottom: 30px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-color); padding-bottom: 15px; position: relative; }
        .back-link {
            color: var(--accent-color); text-decoration: none; font-size: 0.9rem; font-weight: bold;
        }
        .back-link:hover { text-decoration: underline; }
        h1 { color: var(--accent-color); margin: 0 0 5px 0; font-size: 2.2rem; letter-spacing: -0.5px; }
        .subtitle { color: var(--sub-text); margin: 0; font-size: 0.95rem; }

        .header-main-titles { text-align: left; }
        .header-actions { display: flex; gap: 8px; align-items: center; }
        .btn-action { background: transparent; border: 1px solid var(--accent-color); color: var(--accent-color); padding: 6px 14px; border-radius: 6px; font-weight: bold; font-size: 0.8rem; cursor: pointer; transition: background 0.2s; text-transform: uppercase; }
        .btn-action:hover { background: rgba(187, 134, 252, 0.08); }
        .btn-action-primary { background: var(--accent-color); color: #121212; border: none; }
        .btn-action-primary:hover { opacity: 0.9; }

        .controls-panel {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 14px;
            padding: 20px;
            margin-bottom: 25px;
            display: flex;
            gap: 12px;
            align-items: flex-end;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .form-group { flex: 1.2; text-align: left; }
        .form-group-sm { flex: 0.5; text-align: left; }
        label { display: block; font-size: 0.8rem; font-weight: bold; margin-bottom: 6px; color: #aaa; text-transform: uppercase; }
        input, select {
            width: 100%;
            background: #252525;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 10px;
            color: white;
            box-sizing: border-box;
            font-size: 0.9rem;
            height: 41px;
        }
        input:focus, select:focus { border-color: var(--accent-color); outline: none; }
        
        .browse-wrapper { position: relative; display: inline-block; width: 100%; }
        .file-input { position: absolute; left: 0; top: 0; opacity: 0; width: 100%; height: 100%; cursor: pointer; }
        .btn-browse {
            display: flex; align-items: center; justify-content: center; background: #2d2d2d;
            border: 1px dashed var(--accent-color); color: var(--accent-color); border-radius: 6px;
            padding: 10px; font-weight: bold; font-size: 0.85rem; text-transform: uppercase; box-sizing: border-box; height: 41px; transition: background 0.2s;
        }
        .browse-wrapper:hover .btn-browse { background: rgba(187, 134, 252, 0.05); }

        .btn-add {
            background: var(--accent-color); color: #121212; border: none; padding: 11px 15px;
            border-radius: 6px; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 0.85rem; transition: 0.2s; height: 41px;
        }
        .btn-add:hover { opacity: 0.9; }

        .btn-clear-all {
            background: transparent; border: 1px solid var(--warning-color); color: var(--warning-color);
            padding: 11px 15px; border-radius: 6px; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 0.85rem; transition: 0.2s; height: 41px;
        }
        .btn-clear-all:hover { background: rgba(207, 102, 121, 0.1); }

        .asset-table-container {
            background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 14px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        table { width: 100%; border-collapse: collapse; text-align: left; font-size: 0.9rem; }
        th, td { padding: 14px 18px; border-bottom: 1px solid #2d2d2d; }
        th { background: #181818; color: var(--accent-color); font-weight: 600; text-transform: uppercase; font-size: 0.75rem; letter-spacing: 0.5px; }
        tr:last-child td { border-bottom: none; }
        
        .badge { display: inline-block; padding: 4px 10px; border-radius: 12px; font-size: 0.75rem; font-weight: bold; text-transform: uppercase; }
        .badge-done { background: rgba(3, 218, 198, 0.15); color: var(--success-color); }
        .badge-wip { background: rgba(187, 134, 252, 0.15); color: var(--accent-color); }
        .badge-pending { background: rgba(207, 102, 121, 0.15); color: var(--warning-color); }

        .path-text { font-family: 'Courier New', Courier, monospace; color: #888; font-size: 0.8rem; cursor: pointer; transition: color 0.2s; }
        .path-text:hover { color: var(--accent-color); }

        .action-delete { background: transparent; border: none; color: #666; cursor: pointer; font-size: 1.1rem; transition: color 0.2s; }
        .action-delete:hover { color: var(--warning-color); }
        
        .empty-state { padding: 30px; text-align: center; color: var(--sub-text); font-style: italic; }

        @media (max-width: 768px) {
            header { flex-direction: column; gap: 15px; align-items: flex-start; }
            .header-actions { width: 100%; justify-content: flex-start; }
            .controls-panel { flex-direction: column; align-items: stretch; gap: 15px; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="header-main-titles">
            <a href="index.html" class="back-link">← DASHBOARD</a>
            <h1>Project Asset Manager</h1>
            <p class="subtitle">Workspace Inventory & Render Status Pipeline</p>
        </div>
        <div class="header-actions">
            <input type="file" id="manifestLoadSelector" accept=".txt" style="display: none;" onchange="loadManifestFromFile(this)">
            <button class="btn-action" onclick="document.getElementById('manifestLoadSelector').click()">📂 LOAD</button>
            <button class="btn-action" onclick="printAssets()">🖨 PRINT</button>
            <button class="btn-action btn-action-primary" onclick="downloadAssetManifest()">💾 SAVE</button>
        </div>
    </header>

    <div class="controls-panel">
        <div class="form-group-sm" style="flex: 0.4;">
            <label>Find File</label>
            <div class="browse-wrapper">
                <div class="btn-browse">Browse...</div>
                <input type="file" id="fileBrowser" class="file-input" onchange="handleFileSelect(this)">
            </div>
        </div>
        <div class="form-group">
            <label for="assetName">Asset / File Name</label>
            <input type="text" id="assetName" placeholder="Filename auto-fills or type here...">
        </div>
        <div class="form-group-sm">
            <label for="assetType">Type</label>
            <select id="assetType">
                <option value="Video">Video</option>
                <option value="Audio">Audio</option>
                <option value="Model">Model / Preset</option>
                <option value="Script">Script/Doc</option>
            </select>
        </div>
        <div class="form-group-sm">
            <label for="assetStatus">Status</label>
            <select id="assetStatus">
                <option value="Complete">Complete</option>
                <option value="In Progress">In Progress</option>
                <option value="Pending">Pending</option>
            </select>
        </div>
        <button class="btn-add" onclick="addAsset()">Track</button>
        <button class="btn-clear-all" onclick="clearWorkspace()" title="Clear Entire Asset Workspace">Wipe All</button>
    </div>

    <div class="asset-table-container">
        <table>
            <thead>
                <tr>
                    <th>Asset Name</th>
                    <th>Type</th>
                    <th>Status</th>
                    <th>Workspace Context (Click to Copy)</th>
                    <th style="width: 40px;"></th>
                </tr>
            </thead>
            <tbody id="assetTableBody">
                </tbody>
        </table>
        <div id="emptyNotification" class="empty-state" style="display: none;">No tracked assets found. Browse or enter a file above to begin.</div>
    </div>
</div>

<script>
    let assetInventory = [];

    window.onload = function() {
        const cache = localStorage.getItem('solLeeSoftAssets');
        if (cache && cache.includes('launch_sequence_heavy_bfp16')) {
            localStorage.removeItem('solLeeSoftAssets');
        }
        loadAssetsFromMemory();
    };

    function handleFileSelect(input) {
        if (input.files && input.files.length > 0) {
            const filename = input.files[0].name;
            document.getElementById('assetName').value = filename;
            
            const extension = filename.split('.').pop().toLowerCase();
            const typeSelect = document.getElementById('assetType');
            
            if (['mp4', 'mkv', 'avi', 'mov', 'webm'].includes(extension)) {
                typeSelect.value = 'Video';
            } else if (['wav', 'mp3', 'flac', 'ogg', 'm4a'].includes(extension)) {
                typeSelect.value = 'Audio';
            } else if (['json', 'txt', 'pdf', 'html'].includes(extension)) {
                typeSelect.value = 'Script';
            } else if (['safetensors', 'ckpt', 'pt', 'pth', 'yaml'].includes(extension)) {
                typeSelect.value = 'Model';
            }
        }
    }

    function getContextFolder(type) {
        let systemFolder = 'Renders';
        if (type === 'Audio') systemFolder = 'Audio';
        if (type === 'Model') systemFolder = 'Models';
        if (type === 'Script') systemFolder = 'Docs';
        return `D:\\\\Workspace\\\\${systemFolder}\\\\`;
    }

    function renderTable() {
        const tbody = document.getElementById('assetTableBody');
        const emptyNotice = document.getElementById('emptyNotification');
        tbody.innerHTML = ''; 

        if (assetInventory.length === 0) {
            emptyNotice.style.display = 'block';
            return;
        } else {
            emptyNotice.style.display = 'none';
        }

        assetInventory.forEach((asset, index) => {
            const row = document.createElement('tr');
            let badgeClass = 'badge-pending';
            if (asset.status === 'Complete') badgeClass = 'badge-done';
            if (asset.status === 'In Progress') badgeClass = 'badge-wip';

            const pathText = getContextFolder(asset.type);

            row.innerHTML = `
                <td style="font-weight: 500;">${asset.name}</td>
                <td>${asset.type}</td>
                <td><span class="badge ${badgeClass}">${asset.status}</span></td>
                <td><span class="path-text" onclick="copyPath(this)">${pathText}</span></td>
                <td><button class="action-delete" onclick="deleteAsset(${index})">&times;</button></td>
            `;
            tbody.appendChild(row);
        });
    }

    function addAsset() {
        const name = document.getElementById('assetName').value.trim();
        const type = document.getElementById('assetType').value;
        const status = document.getElementById('assetStatus').value;
        
        if (!name) {
            alert('Please select a file or enter an asset name.');
            return;
        }

        assetInventory.push({ name, type, status });
        saveAssetsToMemory();
        renderTable();
        
        document.getElementById('assetName').value = '';
        document.getElementById('fileBrowser').value = '';
    }

    function deleteAsset(index) {
        assetInventory.splice(index, 1);
        saveAssetsToMemory();
        renderTable();
    }

    function clearWorkspace() {
        if(confirm("Are you sure you want to clear out your asset tracking workspace?")) {
            assetInventory = [];
            saveAssetsToMemory();
            renderTable();
        }
    }

    function saveAssetsToMemory() {
        localStorage.setItem('solLeeSoftAssets', JSON.stringify(assetInventory));
    }

    function loadAssetsFromMemory() {
        const stored = localStorage.getItem('solLeeSoftAssets');
        if (stored) {
            assetInventory = JSON.parse(stored);
        } else {
            assetInventory = []; 
        }
        renderTable();
    }

    function copyPath(element) {
        const path = element.innerText;
        navigator.clipboard.writeText(path).then(() => {
            const originalColor = element.style.color;
            element.style.color = '#03dac6';
            element.innerText = 'Copied Path!';
            setTimeout(() => {
                element.style.color = originalColor;
                element.innerText = path;
            }, 1000);
        });
    }

    function compileManifestText() {
        if (assetInventory.length === 0) return "No tracked assets currently inside inventory workspace ledger.";
        let manifest = `[PROJECT ASSET LEDGER MANIFEST]\nGENERATED: ${new Date().toLocaleString()}\n----------------------------------------------------------------------\n`;
        assetInventory.forEach(asset => {
            manifest += `FILE: ${asset.name}\nTYPE: ${asset.type} | STATUS: ${asset.status}\nPATH: ${getContextFolder(asset.type)}\n----------------------------------------------------------------------\n`;
        });
        return manifest;
    }

    function downloadAssetManifest() {
        if (assetInventory.length === 0) return alert("No inventory tracked to save.");
        const text = compileManifestText();
        const dataStr = "data:text/plain;charset=utf-8," + encodeURIComponent(text);
        const downloadAnchor = document.createElement('a');
        downloadAnchor.setAttribute("href", dataStr);
        downloadAnchor.setAttribute("download", `project_asset_manifest.txt`);
        document.body.appendChild(downloadAnchor);
        downloadAnchor.click();
        downloadAnchor.remove();
    }

    function printAssets() {
        if (assetInventory.length === 0) return alert("No active asset inventory rows to print.");
        
        let tableRowsHtml = '';
        assetInventory.forEach(asset => {
            tableRowsHtml += `<tr><td>${asset.name}</td><td>${asset.type}</td><td>${asset.status}</td><td>${getContextFolder(asset.type)}</td></tr>`;
        });

        const printWindow = window.open('', '_blank');
        printWindow.document.write(`
            <html>
            <head>
                <title>Project Inventory Manifest</title>
                <style>
                    body { background: white; color: black; font-family: -apple-system, sans-serif; padding: 0.5in; font-size: 10pt; }
                    h1 { font-size: 16pt; margin-bottom: 5px; text-transform: uppercase; color: #111; }
                    p { color: #666; margin: 0 0 20px 0; font-size: 9pt; }
                    table { width: 100%; border-collapse: collapse; text-align: left; margin-top: 10px; }
                    th, td { padding: 10px; border-bottom: 1px solid #ddd; }
                    th { background: #f0f0f0; font-weight: bold; border-bottom: 2px solid #333; text-transform: uppercase; font-size: 8pt; }
                </style>
            </head>
            <body>
                <h1>Project Inventory Inventory</h1>
                <p>Generated on Local Ledger Hub Session: ${new Date().toLocaleString()}</p>
                <table>
                    <thead>
                        <tr>
                            <th>Asset File Name</th>
                            <th>Category Type</th>
                            <th>Pipeline Status</th>
                            <th>Local File System Context Reference</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${tableRowsHtml}
                    </tbody>
                </table>
                <script>window.onload = function() { window.print(); window.close(); }</s` + `cript>
            </body>
            </html>
        `);
        printWindow.document.close();
    }

    function loadManifestFromFile(input) {
        if (!input.files || input.files.length === 0) return;
        const file = input.files[0];
        const reader = new FileReader();

        reader.onload = function(e) {
            const content = e.target.result;
            try {
                // Splits manifest text blocks to reconstruct raw array items
                const blocks = content.split('----------------------------------------------------------------------');
                const parsedInventory = [];

                blocks.forEach(block => {
                    const fileMatch = block.match(/FILE:\s*(.*)/);
                    const typeStatusMatch = block.match(/TYPE:\s*(\w+)\s*\|\s*STATUS:\s*(.*)/);

                    if (fileMatch && typeStatusMatch) {
                        parsedInventory.push({
                            name: fileMatch[1].trim(),
                            type: typeStatusMatch[1].trim(),
                            status: typeStatusMatch[2].trim()
                        });
                    }
                });

                if (parsedInventory.length > 0) {
                    if (confirm(`Found ${parsedInventory.length} assets inside manifest. Replace current tracking ledger workspace completely?`)) {
                        assetInventory = parsedInventory;
                        saveAssetsToMemory();
                        renderTable();
                        alert("Asset workspace ledger completely restored!");
                    }
                } else {
                    alert("No distinct asset entries found matching file syntax structure.");
                }
            } catch (err) {
                alert("Could not interpret lines from manifest file.");
            }
            input.value = ''; // Reset input node node
        };
        reader.readAsText(file);
    }
</script>

</body>
</html>
